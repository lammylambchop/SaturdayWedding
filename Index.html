<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💍 Wedding Day</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --rose: #c9796a; --deep: #3d2a2a; --gold: #c8a96e; --cream: #fdf6f0; --sage: #8a9e8c; --light: #faf3ee; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--cream); font-family: 'Jost', sans-serif; color: var(--deep); min-height: 100vh; padding-bottom: 40px; }
  header { text-align: center; padding: 52px 24px 28px; border-bottom: 1px solid rgba(200,169,110,0.3); }
  header::before { content: '✦  ✦  ✦'; display: block; color: var(--gold); font-size: 11px; letter-spacing: 8px; margin-bottom: 14px; opacity: 0.7; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 300; line-height: 1.1; }
  h1 em { font-style: italic; color: var(--rose); }
  .subtitle { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sage); margin-top: 8px; }
  #alarm-strip { background: var(--rose); color: white; text-align: center; padding: 16px 20px; display: none; position: sticky; top: 0; z-index: 100; }
  #alarm-strip .alarm-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; }
  #alarm-strip .alarm-sub { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; }
  #alarm-strip button { margin-top: 10px; background: white; color: var(--rose); border: none; border-radius: 20px; padding: 7px 20px; font-family: 'Jost', sans-serif; font-size: 0.8rem; font-weight: 500; cursor: pointer; }
  .container { max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; }
  #current-task-banner { background: linear-gradient(135deg, var(--deep), #5a3a3a); color: var(--cream); border-radius: 14px; padding: 18px 20px; margin-bottom: 20px; display: none; }
  #current-task-banner .label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
  #current-task-banner .task-name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; }
  #current-task-banner .task-time { font-size: 0.75rem; color: rgba(253,246,240,0.55); margin-top: 3px; }
  .next-chip { background: rgba(200,169,110,0.1); border: 1px solid rgba(200,169,110,0.25); border-radius: 10px; padding: 10px 14px; font-size: 0.8rem; margin-bottom: 20px; display: none; }
  .next-chip strong { color: var(--rose); }
  .reminder-box { background: white; border: 1px solid rgba(200,169,110,0.2); border-radius: 14px; padding: 18px; margin-bottom: 24px; text-align: center; }
  .reminder-box p { font-size: 0.78rem; color: var(--sage); margin-top: 10px; line-height: 1.55; }
  .reminder-box p strong { color: var(--deep); }
  .toggle-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .toggle-label { font-size: 0.85rem; font-weight: 500; }
  .ios-toggle { position: relative; width: 51px; height: 31px; flex-shrink: 0; }
  .ios-toggle input { opacity: 0; width: 0; height: 0; }
  .ios-toggle .slider { position: absolute; inset: 0; background: #ccc; border-radius: 31px; transition: background 0.25s; cursor: pointer; }
  .ios-toggle .slider::before { content: ''; position: absolute; width: 27px; height: 27px; left: 2px; top: 2px; background: white; border-radius: 50%; transition: transform 0.25s; box-shadow: 0 1px 4px rgba(0,0,0,0.25); }
  .ios-toggle input:checked + .slider { background: var(--rose); }
  .ios-toggle input:checked + .slider::before { transform: translateX(20px); }
  .section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .section-head h2 { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  .section-head .line { flex: 1; height: 1px; background: linear-gradient(to right, rgba(200,169,110,0.4), transparent); }
  .add-form { background: white; border: 1px solid rgba(200,169,110,0.2); border-radius: 14px; padding: 18px; margin-bottom: 24px; }
  .form-grid { display: grid; grid-template-columns: 130px 1fr; gap: 10px; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  label.field-label { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--sage); font-weight: 500; }
  input[type="text"], input[type="time"], textarea { border: 1px solid rgba(61,42,42,0.15); border-radius: 10px; padding: 11px 13px; font-family: 'Jost', sans-serif; font-size: 16px; color: var(--deep); background: var(--light); outline: none; width: 100%; -webkit-appearance: none; appearance: none; transition: border-color 0.2s; }
  input:focus, textarea:focus { border-color: var(--gold); background: white; }
  textarea { resize: none; min-height: 60px; }
  .photo-btn { display: flex; align-items: center; gap: 8px; background: var(--light); border: 1.5px dashed rgba(200,169,110,0.5); border-radius: 10px; padding: 13px 14px; font-family: 'Jost', sans-serif; font-size: 0.9rem; color: var(--gold); cursor: pointer; width: 100%; text-align: left; margin-top: 10px; font-weight: 500; }
  .photo-previews { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .photo-thumb-wrap { position: relative; width: 64px; height: 64px; }
  .photo-thumb-wrap img { width: 64px; height: 64px; object-fit: cover; border-radius: 10px; border: 1px solid rgba(200,169,110,0.3); }
  .photo-remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--rose); color: white; border: none; font-size: 0.65rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
  .btn-row { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; margin-top: 14px; }
  button.btn { font-family: 'Jost', sans-serif; border: none; border-radius: 10px; padding: 11px 20px; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; }
  button.btn:active { opacity: 0.75; }
  .btn-primary { background: var(--deep); color: var(--cream); }
  .btn-ghost { background: transparent; color: var(--rose); border: 1px solid rgba(201,121,106,0.35); }
  .btn-cancel { background: transparent; color: var(--sage); border: 1px solid rgba(138,158,140,0.35); }
  #timeline { display: flex; flex-direction: column; }
  .task-item { display: grid; grid-template-columns: 72px 20px 1fr; gap: 0 12px; padding-bottom: 18px; }
  .time-col { text-align: right; font-size: 0.78rem; color: var(--rose); font-weight: 500; padding-top: 4px; font-variant-numeric: tabular-nums; }
  .line-col { display: flex; flex-direction: column; align-items: center; }
  .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--gold); background: white; flex-shrink: 0; margin-top: 4px; transition: all 0.3s; }
  .connector { flex: 1; width: 1px; background: rgba(200,169,110,0.28); min-height: 14px; }
  .task-item:last-child .connector { display: none; }
  .task-item.done .dot { background: var(--sage); border-color: var(--sage); }
  .task-item.current .dot { background: var(--rose); border-color: var(--rose); box-shadow: 0 0 0 4px rgba(201,121,106,0.2); }
  .content-col { min-width: 0; }
  .task-title-row { display: flex; align-items: flex-start; gap: 6px; flex-wrap: wrap; }
  .task-title { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; line-height: 1.3; flex: 1; }
  .task-item.done .task-title { color: var(--sage); text-decoration: line-through; text-decoration-color: rgba(138,158,140,0.4); }
  .task-item.current .task-title { color: var(--rose); font-weight: 600; }
  .badge { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 7px; border-radius: 10px; font-weight: 500; flex-shrink: 0; margin-top: 3px; }
  .badge-now { background: var(--rose); color: white; }
  .badge-done { background: var(--sage); color: white; }
  .badge-soon { background: var(--gold); color: var(--deep); }
  .task-note { font-size: 0.76rem; color: rgba(61,42,42,0.5); margin-top: 3px; font-style: italic; line-height: 1.4; white-space: pre-line; }
  .countdown-chip { font-size: 0.68rem; color: var(--gold); font-weight: 500; margin-top: 2px; }
  .task-photos { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .task-photos img { width: 54px; height: 54px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(200,169,110,0.3); cursor: pointer; }
  .task-add-photo-btn { width: 54px; height: 54px; border-radius: 8px; border: 1.5px dashed rgba(200,169,110,0.4); background: rgba(200,169,110,0.05); color: var(--gold); font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .task-action-row { display: flex; gap: 6px; margin-top: 6px; }
  .task-btn { font-family: 'Jost', sans-serif; font-size: 0.7rem; letter-spacing: 0.06em; padding: 5px 11px; border-radius: 6px; cursor: pointer; border: 1px solid rgba(61,42,42,0.15); background: none; color: rgba(61,42,42,0.45); }
  .task-btn.del { color: var(--rose); border-color: rgba(201,121,106,0.25); }
  #lightbox { display: none; position: fixed; inset: 0; background: rgba(20,10,10,0.92); z-index: 999; align-items: center; justify-content: center; }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 92vw; max-height: 85vh; border-radius: 10px; object-fit: contain; }
  #lightbox-close { position: absolute; top: 16px; right: 20px; background: rgba(255,255,255,0.15); border: none; color: white; font-size: 1.2rem; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .empty-state { text-align: center; padding: 48px 0; color: var(--sage); }
  .empty-state .icon { font-size: 2.2rem; margin-bottom: 10px; }
  .empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-style: italic; }
  #hidden-file-input { display: none; }
  @media (max-width: 380px) { .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>My Sister's <em>Wedding Day</em></h1>
  <p class="subtitle">Saturday, 14 March 2026</p>
</header>
<div id="alarm-strip">
  <div class="alarm-title" id="alarm-title"></div>
  <div class="alarm-sub" id="alarm-sub"></div>
  <button onclick="dismissAlarm()">Got it ✓</button>
</div>
<div class="container">
  <div id="current-task-banner">
    <div class="label">Happening Now</div>
    <div class="task-name" id="banner-task-name"></div>
    <div class="task-time" id="banner-task-time"></div>
  </div>
  <div class="next-chip" id="next-chip">Next: <strong id="next-label"></strong> in <strong id="next-countdown"></strong></div>
  <div class="reminder-box">
    <div class="toggle-row">
      <span class="toggle-label">🔔 On-screen Reminders</span>
      <label class="ios-toggle">
        <input type="checkbox" id="reminder-toggle" onchange="toggleReminders(this.checked)">
        <span class="slider"></span>
      </label>
    </div>
    <p>Keep this page open on your iPhone. A <strong>red alert</strong> will pop up at each task time and 15 mins before.<br><br><strong>Tip:</strong> Tap Share ↑ → "Add to Home Screen" so it's easy to find on the day.</p>
  </div>
  <div class="section-head"><h2 id="form-heading">Add a Task</h2><div class="line"></div></div>
  <div class="add-form">
    <input type="hidden" id="editing-id" value="">
    <div class="form-grid">
      <div class="form-group"><label class="field-label">Time</label><input type="time" id="task-time"></div>
      <div class="form-group"><label class="field-label">Task Name</label><input type="text" id="task-title" placeholder="e.g. Bride gets into dress"></div>
    </div>
    <div class="form-group"><label class="field-label">Notes (optional)</label><textarea id="task-note" placeholder="Extra details, location, who's responsible..."></textarea></div>
    <button type="button" class="photo-btn" id="form-photo-btn">📷 &nbsp;Add Photos (optional)</button>
    <div class="photo-previews" id="form-photo-previews"></div>
    <div class="btn-row">
      <button type="button" class="btn btn-cancel" id="cancel-btn" style="display:none" onclick="cancelEdit()">Cancel</button>
      <button type="button" class="btn btn-ghost" onclick="clearAllTasks()">Clear All</button>
      <button type="button" class="btn btn-primary" id="submit-btn" onclick="submitTask()">+ Add to Rundown</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(200,169,110,0.15);">
      <button type="button" class="btn btn-ghost" style="flex:1;font-size:0.75rem;" onclick="exportHTML()">⬇ Save as HTML</button>
      <button type="button" class="btn btn-ghost" style="flex:1;font-size:0.75rem;" onclick="showImportBox()">⬆ Load Schedule</button>
    </div>
    <div id="import-box" style="display:none;margin-top:10px;">
      <label class="field-label">Paste your schedule data below</label>
      <textarea id="import-text" style="margin-top:6px;min-height:80px;font-size:13px;" placeholder="Paste the contents of your wedding-schedule.json file here..."></textarea>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button type="button" class="btn btn-cancel" style="flex:1;" onclick="hideImportBox()">Cancel</button>
        <button type="button" class="btn btn-primary" style="flex:1;" onclick="importFromText()">Load</button>
      </div>
    </div>
  </div>
  <div class="section-head"><h2>Day Rundown</h2><div class="line"></div></div>
  <div id="timeline"></div>
</div>
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>
<input type="file" id="hidden-file-input" accept="image/*" multiple>
<script>
var tasks=[];var taskPhotos={};var pendingPhotos=[];var photoTarget=null;var remindersOn=false;var tickTimer=null;var dismissedAlarms={};
function save(){}function savePhotos(){}
function load(){var el=document.getElementById('baked-data');if(el){try{var d=JSON.parse(el.textContent);if(d&&d.tasks&&d.tasks.length){tasks=d.tasks;taskPhotos=d.taskPhotos||{};}}catch(e){}}}
function timeToMins(t){var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function formatTime(t){var p=t.split(':'),h=parseInt(p[0]),m=parseInt(p[1]),ampm=h>=12?'PM':'AM',hr=h%12||12;return hr+':'+(m<10?'0':'')+m+' '+ampm;}
function nowMins(){var n=new Date();return n.getHours()*60+n.getMinutes();}
function minsUntil(t){return timeToMins(t)-nowMins();}
function taskStatus(task){var d=minsUntil(task.time);if(d<-45)return 'done';if(d<=5)return 'current';return 'upcoming';}
var fileInput=document.getElementById('hidden-file-input');
fileInput.addEventListener('change',function(){var files=Array.from(this.files);if(!files.length)return;var target=photoTarget;files.forEach(function(file){var reader=new FileReader();reader.onload=function(e){var dataUrl=e.target.result;if(target==='form'){pendingPhotos.push({dataUrl:dataUrl});renderFormPreviews();}else if(target!==null){if(!taskPhotos[target])taskPhotos[target]=[];taskPhotos[target].push({dataUrl:dataUrl});render();}};reader.readAsDataURL(file);});this.value='';});
document.getElementById('form-photo-btn').addEventListener('click',function(){photoTarget='form';fileInput.click();});
function pickTaskPhoto(taskId){photoTarget=taskId;fileInput.click();}
function renderFormPreviews(){var wrap=document.getElementById('form-photo-previews');wrap.innerHTML=pendingPhotos.map(function(p,i){return '<div class="photo-thumb-wrap"><img src="'+p.dataUrl+'" onclick="openLightbox(\''+p.dataUrl+'\')"><button class="photo-remove" onclick="removePending('+i+')">x</button></div>';}).join('');}
function removePending(i){pendingPhotos.splice(i,1);renderFormPreviews();}
function submitTask(){var time=document.getElementById('task-time').value;var title=document.getElementById('task-title').value.trim();var note=document.getElementById('task-note').value.trim();var editId=document.getElementById('editing-id').value;document.getElementById('task-time').style.borderColor=time?'':'var(--rose)';document.getElementById('task-title').style.borderColor=title?'':'var(--rose)';if(!time||!title)return;if(editId){var idx=tasks.findIndex(function(t){return String(t.id)===editId;});if(idx!==-1){tasks[idx]=Object.assign({},tasks[idx],{time:time,title:title,note:note});if(pendingPhotos.length){taskPhotos[tasks[idx].id]=(taskPhotos[tasks[idx].id]||[]).concat(pendingPhotos);}}}else{var id=Date.now();tasks.push({id:id,time:time,title:title,note:note});if(pendingPhotos.length){taskPhotos[id]=pendingPhotos.slice();}}tasks.sort(function(a,b){return timeToMins(a.time)-timeToMins(b.time);});resetForm();render();}
function editTask(id){var t=tasks.find(function(t){return t.id===id;});if(!t)return;document.getElementById('editing-id').value=id;document.getElementById('task-time').value=t.time;document.getElementById('task-title').value=t.title;document.getElementById('task-note').value=t.note||'';pendingPhotos=taskPhotos[id]?taskPhotos[id].slice():[];renderFormPreviews();document.getElementById('form-heading').textContent='Edit Task';document.getElementById('submit-btn').textContent='Save Changes';document.getElementById('cancel-btn').style.display='inline-block';document.getElementById('task-time').scrollIntoView({behavior:'smooth',block:'center'});}
function removeTask(id){if(!confirm('Remove this task?'))return;tasks=tasks.filter(function(t){return t.id!==id;});delete taskPhotos[id];render();}
function cancelEdit(){resetForm();}
function resetForm(){document.getElementById('editing-id').value='';document.getElementById('task-time').value='';document.getElementById('task-title').value='';document.getElementById('task-note').value='';document.getElementById('task-time').style.borderColor='';document.getElementById('task-title').style.borderColor='';document.getElementById('form-heading').textContent='Add a Task';document.getElementById('submit-btn').textContent='+ Add to Rundown';document.getElementById('cancel-btn').style.display='none';pendingPhotos=[];renderFormPreviews();}
function clearAllTasks(){if(!confirm('Clear all tasks and start fresh?'))return;tasks=[];taskPhotos={};render();}
function toggleReminders(on){remindersOn=on;if(on){tick();tickTimer=setInterval(tick,30000);}else{clearInterval(tickTimer);document.getElementById('alarm-strip').style.display='none';}}
function tick(){render();if(!remindersOn)return;tasks.forEach(function(task){var diff=minsUntil(task.time);[0,15].forEach(function(ahead){var key=task.id+'-'+ahead;var inWindow=ahead===0?(diff>=-1&&diff<=1):(diff>=ahead-1&&diff<=ahead+1);if(inWindow&&!dismissedAlarms[key]){dismissedAlarms[key]=true;showAlarm(task,ahead);}});});}
function showAlarm(task,ahead){document.getElementById('alarm-title').textContent=ahead===0?'Now: '+task.title:'In 15 mins: '+task.title;document.getElementById('alarm-sub').textContent=ahead===0?"It's time! ("+formatTime(task.time)+')':"Coming up at "+formatTime(task.time);document.getElementById('alarm-strip').style.display='block';window.scrollTo({top:0,behavior:'smooth'});if(navigator.vibrate)navigator.vibrate([300,100,300]);}
function dismissAlarm(){document.getElementById('alarm-strip').style.display='none';}
function render(){var current=tasks.find(function(t){return taskStatus(t)==='current';});var banner=document.getElementById('current-task-banner');if(current){banner.style.display='block';document.getElementById('banner-task-name').textContent=current.title;document.getElementById('banner-task-time').textContent='Started at '+formatTime(current.time);}else{banner.style.display='none';}var next=tasks.find(function(t){return minsUntil(t.time)>1;});var chip=document.getElementById('next-chip');if(next){var diff=minsUntil(next.time);var label=diff<60?diff+'min'+(diff!==1?'s':''):Math.floor(diff/60)+'h '+(diff%60>0?diff%60+'m':'');chip.style.display='block';document.getElementById('next-label').textContent=next.title;document.getElementById('next-countdown').textContent=label;}else{chip.style.display='none';}var tl=document.getElementById('timeline');if(!tasks.length){tl.innerHTML='<div class="empty-state"><div class="icon">🌸</div><p>Add your first task above</p></div>';return;}tl.innerHTML=tasks.map(function(task){var status=taskStatus(task);var diff=minsUntil(task.time);var badge=status==='current'?'<span class="badge badge-now">Now</span>':status==='done'?'<span class="badge badge-done">Done</span>':diff<=30?'<span class="badge badge-soon">Soon</span>':'';var countdown='';if(status==='upcoming'){countdown=diff<60?'<div class="countdown-chip">in '+diff+' min'+(diff!==1?'s':'')+'</div>':'<div class="countdown-chip">in '+Math.floor(diff/60)+'h '+(diff%60>0?diff%60+'m':'')+'</div>';}var photos=taskPhotos[task.id]||[];var photoHtml='<div class="task-photos">'+photos.map(function(p){return '<img src="'+p.dataUrl+'" onclick="openLightbox(\''+p.dataUrl+'\')">';}).join('')+'<button class="task-add-photo-btn" onclick="pickTaskPhoto('+task.id+')" title="Add photo">+</button></div>';return '<div class="task-item '+status+'"><div class="time-col">'+formatTime(task.time)+'</div><div class="line-col"><div class="dot"></div><div class="connector"></div></div><div class="content-col"><div class="task-title-row"><div class="task-title">'+task.title+'</div>'+badge+'</div>'+(task.note?'<div class="task-note">'+task.note+'</div>':'')+countdown+photoHtml+'<div class="task-action-row"><button class="task-btn" onclick="editTask('+task.id+')">Edit</button><button class="task-btn del" onclick="removeTask('+task.id+')">Remove</button></div></div></div>';}).join('');}
function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function exportHTML(){var data=JSON.stringify({tasks:tasks,taskPhotos:taskPhotos});var injected='<script id="baked-data" type="application/json">'+data+'<\/script>';var html=document.documentElement.outerHTML;html=html.replace('<\/body>',injected+'<\/body>');var blob=new Blob([html],{type:'text/html'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='wedding-day-reminder.html';a.click();URL.revokeObjectURL(url);}
function showImportBox(){document.getElementById('import-box').style.display='block';document.getElementById('import-text').value='';}
function hideImportBox(){document.getElementById('import-box').style.display='none';document.getElementById('import-text').value='';}
function importFromText(){var text=document.getElementById('import-text').value.trim();if(!text){alert('Please paste your schedule data first.');return;}try{var data=JSON.parse(text);if(data.tasks&&data.tasks.length){tasks=data.tasks;taskPhotos=data.taskPhotos||{};render();hideImportBox();alert('Done! '+tasks.length+' tasks loaded.');}else{alert('No tasks found in the pasted data.');}}catch(err){alert('Could not read the pasted text.');}}
load();render();
